name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  analyze:
    name: Analyze (go)
    # Code scanning SARIF upload requires Code Scanning to be enabled on the
    # repository, which on private repos requires GitHub Advanced Security.
    # The job runs as soon as the repo is public (or has GHAS).
    if: github.event.repository.private == false || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"
