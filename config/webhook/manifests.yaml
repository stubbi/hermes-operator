---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-hermes-agent-v1-hermesinstance
  failurePolicy: Fail
  name: mhermesinstance.hermes.agent
  rules:
  - apiGroups:
    - hermes.agent
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesinstances
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-hermes-agent-v1-hermesclusterdefaults
  failurePolicy: Fail
  name: vhermesclusterdefaults.hermes.agent
  rules:
  - apiGroups:
    - hermes.agent
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesclusterdefaults
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-hermes-agent-v1-hermesinstance
  failurePolicy: Fail
  name: vhermesinstance.hermes.agent
  rules:
  - apiGroups:
    - hermes.agent
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesinstances
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-hermes-agent-v1-hermesselfconfig
  failurePolicy: Fail
  name: vhermesselfconfig.hermes.agent
  rules:
  - apiGroups:
    - hermes.agent
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - hermesselfconfigs
  sideEffects: None
