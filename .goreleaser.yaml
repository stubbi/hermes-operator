version: 2

project_name: hermes-operator

# Run after --clean wipes dist/, before archives/release glob extra_files.
# The CI workflow also has setup-go + kubectl + kustomize available.
before:
  hooks:
    - make installer

builds:
  - id: manager
    main: ./cmd
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

# Container images are built separately by docker/build-push-action in the
# release workflow. GoReleaser's dockers_v2 had trouble staging the prebuilt
# binary into the build context, and buildx with native Go cross-compile
# (BUILDPLATFORM) is faster than QEMU anyway.

archives:
  - id: binaries
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^build:"

release:
  draft: true
  replace_existing_artifacts: true
  github:
    owner: stubbi
    name: hermes-operator
  extra_files:
    - glob: dist/install.yaml
