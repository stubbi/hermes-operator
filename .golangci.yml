version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        # Enable a sensible subset; Plan 6 will tighten via a dedicated config.
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
  exclusions:
    rules:
      - path: zz_generated.*\.go
        linters: [staticcheck, revive, gocritic]
      - path: _test\.go
        linters: [revive]
        text: 'dot-imports'
      - path: _test\.go
        linters: [staticcheck]
        text: 'ST1001'
      - path: test/
        linters: [staticcheck]
        text: 'ST1001'

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/stubbi/hermes-operator
