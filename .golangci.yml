run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    - gocritic
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  gocritic:
    enabled-checks:
      - octalLiteral
  goimports:
    local-prefixes: github.com/stubbi/hermes-operator

issues:
  exclude-rules:
    - path: zz_generated.*\.go
      linters: [staticcheck, revive, gocritic]
    - path: (test/e2e|internal/controller)/.*_test\.go
      linters: [revive]
      text: "dot-imports"
